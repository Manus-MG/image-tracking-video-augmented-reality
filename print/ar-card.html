<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Card — Print Me!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f5;
        }

        .card {
            width: 400px;
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card h1 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .card .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #e94560;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .marker-img {
            width: 240px;
            height: auto;
            border-radius: 8px;
            border: 2px solid #eee;
            margin-bottom: 24px;
        }

        .qr-container {
            margin: 0 auto 24px;
        }

        .qr-container canvas {
            border-radius: 8px;
        }

        .instructions {
            background: #f8f8fc;
            border-radius: 12px;
            padding: 16px;
            text-align: left;
        }

        .instructions h3 {
            font-size: 14px;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .instructions ol {
            font-size: 13px;
            color: #555;
            padding-left: 20px;
            line-height: 1.8;
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        .url-display {
            font-size: 12px;
            color: #999;
            word-break: break-all;
            margin-top: 12px;
        }

        @media print {
            body {
                background: #fff;
            }

            .card {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎬 AR Experience</h1>
        <p class="subtitle">Scan → Watch → Enjoy</p>

        <div class="divider"></div>

        <!-- QR Code -->
        <p class="section-label">① Scan This QR Code</p>
        <div class="qr-container" id="qr-container"></div>

        <div class="divider"></div>

        <!-- Marker Image -->
        <p class="section-label">② Point Camera at This Image</p>
        <img class="marker-img" src="../assets/thf.jpeg" alt="AR Marker Image">

        <div class="divider"></div>

        <!-- Instructions -->
        <div class="instructions">
            <h3>📋 How to use</h3>
            <ol>
                <li>Scan the QR code above with your phone</li>
                <li>Allow camera access when prompted</li>
                <li>Point your camera at the marker image</li>
                <li>Watch the video appear on the image! 🎥</li>
            </ol>
        </div>

        <p class="url-display" id="url-display"></p>
    </div>

    <!-- QR Code Generator Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <script>
        // Wait for all scripts to load before generating QR
        window.addEventListener('load', function () {
            // Change this to your deployed HTTPS URL
            const AR_PAGE_URL = window.location.origin + '/';

            // Generate QR code
            const qrContainer = document.getElementById('qr-container');
            const canvas = document.createElement('canvas');
            qrContainer.appendChild(canvas);

            QRCode.toCanvas(canvas, AR_PAGE_URL, {
                width: 200,
                margin: 2,
                color: {
                    dark: '#1a1a2e',
                    light: '#ffffff'
                }
            }, function (error) {
                if (error) console.error('QR Error:', error);
            });

            // Show URL
            document.getElementById('url-display').textContent = AR_PAGE_URL;
        });
    </script>
</body>

</html>
