<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindAR Target Compiler</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #e94560; }
    .status { padding: 12px; border-radius: 8px; margin: 16px 0; background: #16213e; }
    button { background: #e94560; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress { width: 100%; height: 20px; background: #16213e; border-radius: 10px; overflow: hidden; margin: 12px 0; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #e94560, #0f3460); transition: width 0.3s; width: 0%; }
    img { max-width: 200px; border-radius: 8px; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>🎯 MindAR Target Compiler</h1>
  <p>This tool compiles <code>thf.jpeg</code> into a <code>targets.mind</code> file for MindAR image tracking.</p>
  
  <div id="preview"></div>
  <button id="compileBtn" onclick="compileTarget()">Compile Target</button>
  
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status" id="status">Ready to compile.</div>

  <script>
    async function compileTarget() {
      const btn = document.getElementById('compileBtn');
      const status = document.getElementById('status');
      const progressBar = document.getElementById('progressBar');
      btn.disabled = true;
      status.textContent = 'Loading image...';

      try {
        // Load the image
        const img = new Image();
        img.crossOrigin = 'anonymous';
        // img.src = '../assets/thf2.jpeg';
        img.src = '../assets/ventimg2.JPG';
        
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
        });

        // Show preview
        document.getElementById('preview').innerHTML = `<img src="${img.src}" alt="Target"><p>Image loaded: ${img.width}x${img.height}</p>`;

        status.textContent = 'Compiling target... This may take a minute.';
        
        // Use MindAR compiler
        const compiler = new MINDAR.IMAGE.Compiler();
        
        await compiler.compileImageTargets([img], (progress) => {
          const pct = Math.round(progress);
          progressBar.style.width = pct + '%';
          status.textContent = `Compiling... ${pct}%`;
        });

        const exportedBuffer = await compiler.exportData();
        
        // Download the .mind file
        const blob = new Blob([exportedBuffer]);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'targets.mind';
        a.click();
        URL.revokeObjectURL(url);

        progressBar.style.width = '100%';
        status.textContent = '✅ Done! targets.mind downloaded. Move it to the assets/ folder.';
      } catch (err) {
        status.textContent = '❌ Error: ' + err.message;
        console.error(err);
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
