<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Experience</title>
    <meta name="description" content="Point your camera at the marker image to see the AR video experience.">

    <!-- Preconnect for CDN performance -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- A-Frame MUST load first -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- MindAR Image Tracking (A-Frame integration) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <!-- Custom target handler component — MUST register before scene parses -->
    <script src="js/app.js"></script>
</head>

<body>

    <!-- ===== Loading Overlay ===== -->
    <div id="loading-overlay">
        <div class="loading-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" />
                <path
                    d="M9 2 7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9Zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z" />
            </svg>
        </div>
        <div class="loading-text">Initializing Camera...</div>
        <div class="loading-subtext">Please allow camera access when prompted</div>
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- ===== Scanning Hint ===== -->
    <div id="scanning-hint">
        <span class="scan-icon">📷</span>
        Point camera at the marker image
    </div>

    <!-- ===== Target Found Indicator ===== -->
    <div id="target-found-indicator">✅ Target Detected</div>

    <!-- ===== Tap to Play (iOS fallback) ===== -->
    <div id="tap-to-play">
        <div class="tap-content">
            <div class="tap-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </div>
            <div class="tap-text">Tap to Play Video</div>
        </div>
    </div>

    <!-- ===== A-Frame AR Scene ===== -->
    <a-scene
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 5; warmupTolerance: 3;"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="antialias: true; alpha: true; colorManagement: true;" embedded>
        <!-- Preload the video -->
        <a-assets>
            <video id="ar-video" src="assets/video.mp4" preload="auto" loop crossorigin="anonymous" webkit-playsinline
                playsinline muted></video>
        </a-assets>

        <!-- Camera -->
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Image Target 0 = thf.jpeg -->
        <a-entity mindar-image-target="targetIndex: 0" targethandler>
            <!-- Video plane — anchored to the target -->
            <a-video src="#ar-video" position="0 0 0" width="1.563" height="2" rotation="0 0 0"
                material="shader: flat;"></a-video>
        </a-entity>

    </a-scene>

</body>

</html>
